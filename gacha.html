<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  color:white;
  background:
    radial-gradient(circle at top,#3b1b00,#050505 65%),
    repeating-linear-gradient(45deg,rgba(255,215,0,.05) 0 2px,transparent 2px 16px);
}
.wrap{max-width:1100px;margin:auto;padding:20px;text-align:center}
h1{color:#ffd36b;font-size:38px}
.panel{
  background:rgba(0,0,0,.72);
  border:1px solid #b88732;
  border-radius:22px;
  padding:22px;
  margin:20px 0;
  box-shadow:0 0 20px rgba(255,190,70,.2);
}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.stat{
  background:#111;
  border:1px solid #b88732;
  border-radius:14px;
  padding:12px 18px;
  min-width:140px;
}
.stat b{color:#ffd36b;font-size:23px}
button,a.btn{
  display:inline-block;
  margin:8px;
  padding:13px 22px;
  border:0;
  border-radius:14px;
  background:linear-gradient(135deg,#7b1bff,#ff244f);
  color:white;
  font-weight:bold;
  text-decoration:none;
  cursor:pointer;
}
.gold{background:linear-gradient(135deg,#ffe27a,#a66700)!important;color:#1a1000!important}

.pack{
  width:230px;height:320px;margin:25px auto;
  border-radius:22px;
  border:3px solid #ffd36b;
  background:
    radial-gradient(circle at 50% 25%,#663cff,#16001f 45%,#070707 75%);
  box-shadow:0 0 28px rgba(255,210,90,.6);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.pack h2{color:#ffd36b;margin:0}
.pack .num{font-size:76px;font-weight:bold;color:#ffd36b}
.cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:25px}

.card{
  width:205px;height:365px;border-radius:18px;padding:10px;
  position:relative;overflow:hidden;border:2px solid #ffd36b;
  box-shadow:0 0 18px rgba(255,255,255,.25);
}
.card::before{
  content:"";
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 15%,rgba(255,255,255,.45),transparent 12%),
    radial-gradient(circle at 80% 25%,rgba(255,255,255,.2),transparent 18%),
    repeating-linear-gradient(135deg,rgba(255,255,255,.12) 0 2px,transparent 2px 12px),
    url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity:.55;
}
.card img{
  width:100%;height:195px;object-fit:cover;border-radius:12px;
  position:relative;z-index:2;background:#111;
}
.tier{
  position:absolute;top:12px;left:12px;z-index:3;
  padding:5px 9px;border-radius:8px;font-weight:bold;
}
.name{font-size:24px;font-weight:bold;margin-top:10px;position:relative;z-index:2}
.jiko{font-size:12px;line-height:1.35;margin-top:7px;position:relative;z-index:2}
.N{background:linear-gradient(135deg,#3b3b3b,#b8b8b8,#222)}
.R{background:linear-gradient(135deg,#003c8f,#00c8ff,#001b44)}
.SR{background:linear-gradient(135deg,#41106f,#b51dff,#ff55c8)}
.SSR{background:linear-gradient(135deg,#7b3f00,#ffbd2e,#ff4a00)}
.UR{background:linear-gradient(135deg,#ff0077,#6a20ff,#00eaff)}
.LR{background:linear-gradient(135deg,#fff078,#ff9d00,#ff2bc2,#4422ff)}
.SECRET{background:linear-gradient(135deg,#000,#30005f,#fff,#ff00d4)}
.INFINITY{background:linear-gradient(135deg,#000,#6a00ff,#ffd700,#fff)}
.N .tier{background:#777}.R .tier{background:#007bff}.SR .tier{background:#9c27b0}
.SSR .tier{background:#ff9800}.UR .tier{background:#e91e63}.LR .tier{background:#ffd700;color:#111}
.SECRET .tier,.INFINITY .tier{background:#fff;color:#111}
</style>
</head>

const special={name:"OGURI YUI",img:"images/oguri-yui.jpg",jiko:"Special guest card. Infinity tier exclusive."};

function cycle(){
 const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}-${Math.floor(d.getHours()/12)}`;
}
function resetTime(){
 const d=new Date(),n=new Date(d);
 if(d.getHours()<12)n.setHours(12,0,0,0);else{n.setDate(n.getDate()+1);n.setHours(0,0,0,0)}
 return n.getTime();
}
function getUsed(){let x=JSON.parse(localStorage.t48_used_simple||"{}");return x.cycle===cycle()?x.used||0:0}
function setUsed(v){localStorage.t48_used_simple=JSON.stringify({cycle:cycle(),used:v})}
function col(){return JSON.parse(localStorage.t48_col_simple||"[]")}
function saveCol(v){localStorage.t48_col_simple=JSON.stringify(v)}
function dupe(){return Number(localStorage.t48_dupe_simple||0)}
function setDupe(v){localStorage.t48_dupe_simple=v}

function pickTier(){
 let r=Math.random()*100,s=0;
 for(const t of tiers){s+=t.rate;if(r<=s)return t}
 return tiers[0];
}
function makeCard(){
 const tier=pickTier();
 const m=tier.name==="INFINITY"?special:members[Math.floor(Math.random()*members.length)];
 return {...m,tier:tier.name,id:`${m.name}_${tier.name}`};
}
function openPack(n){
 let used=getUsed();
 if(used>=DAILY_LIMIT)return alert("Pack habis. Tunggu reset berikutnya.");
 let packs=Math.min(n,DAILY_LIMIT-used);
 setUsed(used+packs);
 let cards=[];
 for(let i=0;i<packs*CARDS_PER_PACK;i++)cards.push(makeCard());
 reveal(cards);
 update();
}
function reveal(cards){
 let c=col(),d=dupe();
 document.getElementById("cards").innerHTML="";
 cards.forEach(x=>{
   if(c.includes(x.id)) d++; else c.push(x.id);
   document.getElementById("cards").innerHTML+=`
   <div class="card ${x.tier}">
     <div class="tier">${x.tier}</div>
     <img src="${x.img}" onerror="this.src='https://via.placeholder.com/300x400/111111/ffffff?text=${x.name}'">
     <div class="name">${x.name}</div>
     <div class="jiko">${x.jiko}</div>
   </div>`;
 });
 saveCol(c);setDupe(d);
}
function claimBonusPack(){
 if(dupe()<20)return alert("Duplicate belum cukup.");
 setDupe(dupe()-20);
 reveal([makeCard(),makeCard(),makeCard(),makeCard(),makeCard()]);
 update();
}
function update(){
 document.getElementById("packLeft").innerText=`${DAILY_LIMIT-getUsed()}/${DAILY_LIMIT}`;
 document.getElementById("collectionCount").innerText=`${col().length}/435`;
 document.getElementById("dupeCount").innerText=`${dupe()}/20`;
}
function tick(){
 let l=resetTime()-Date.now();
 let h=String(Math.floor(l/3600000)).padStart(2,"0");
 let m=String(Math.floor((l%3600000)/60000)).padStart(2,"0");
 let s=String(Math.floor((l%60000)/1000)).padStart(2,"0");
 document.getElementById("countdown").innerText=`${h}:${m}:${s}`;
}
setInterval(tick,1000);tick();update();
