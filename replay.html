<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replay Theater48Fight</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

.replay-wrap{
    max-width:1100px;
    margin:auto;
    background:#0b0b0b;
}

.player-box{
    position:sticky;
    top:0;
    z-index:10;
    background:#000;
}

.player iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    display:block;
}

.action-row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    background:#111;
    padding:12px;
}

.action-row a{
    background:#ff2b2b;
    color:white;
    text-decoration:none;
    padding:10px 18px;
    border-radius:10px;
    font-weight:bold;
}

.lineup-box{
    background:#151515;
    margin:12px 0;
    padding:22px 15px;
    text-align:center;
    border-radius:0 0 22px 22px;
}

.lineup-box h2{
    margin:0 0 18px;
    font-size:26px;
}

.lineup-box button{
    background:#ff5bbd;
    border:none;
    color:white;
    padding:13px 30px;
    border-radius:12px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.lineup-list{
    display:none;
    margin-top:18px;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

.member{
    width:82px;
    text-align:center;
}

.member img{
    width:64px;
    height:64px;
    border-radius:50%;
    object-fit:cover;
    background:#222;
    border:2px solid #ff2b2b;
}

.member div{
    margin-top:5px;
    font-size:12px;
}

.replay-list{
    padding:18px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:14px;
}

.replay-card{
    display:flex;
    gap:16px;
    align-items:center;
    background:#1b1b1b;
    border:1.5px solid #ff2b2b;
    border-radius:14px;
    padding:12px;
    cursor:pointer;
    transition:.2s;
}

.replay-card:hover{
    background:#252525;
    transform:scale(1.01);
}

.replay-card.active{
    border:2px solid #ff2b2b;
    background:#251515;
    box-shadow:0 0 12px rgba(255,43,43,.5);
}

.replay-card img{
    width:170px;
    height:96px;
    object-fit:cover;
    border-radius:10px;
    background:#222;
    flex-shrink:0;
}

.replay-info{
    text-align:left;
}

.replay-title{
    font-size:18px;
    font-weight:bold;
    line-height:1.35;
}

.replay-date{
    margin-top:8px;
    color:#aaa;
    font-size:15px;
}

/* MOBILE */
@media(max-width:650px){
    .replay-wrap{
        max-width:100%;
    }

    .replay-list{
        padding:12px;
        display:flex;
        flex-direction:column;
        gap:14px;
    }

    .replay-card{
        gap:12px;
        padding:10px;
        border:1.5px solid #ff2b2b;
    }

    .replay-card img{
        width:135px;
        height:76px;
    }

    .replay-title{
        font-size:16px;
    }

    .replay-date{
        font-size:14px;
    }

    .lineup-box h2{
        font-size:24px;
    }
}
</style>
</head>

<body>

<div class="replay-wrap">

    <div class="player-box">
        <div class="player">
            <iframe
                id="mainPlayer"
                src="https://www.youtube.com/embed/8PQIt0DT5ls?rel=0&playsinline=0&fs=1"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                allowfullscreen
                webkitallowfullscreen
                mozallowfullscreen>
            </iframe>
        </div>

        <div class="action-row">
            <a id="openYoutube" href="https://youtu.be/8PQIt0DT5ls" target="_blank">
                Buka di YouTube
            </a>
        </div>
    </div>

    <div class="lineup-box">
        <h2>Line up Member</h2>
        <button onclick="toggleLineup()">Tampilkan Line-up</button>

        <div class="lineup-list" id="lineupList">
            <div class="member">
                <img src="images/freya.jpg" onerror="this.src='https://via.placeholder.com/120/111111/ffffff?text=FREYA'">
                <div>Freya</div>
            </div>
            <div class="member">
                <img src="images/christy.jpg" onerror="this.src='https://via.placeholder.com/120/111111/ffffff?text=CHRISTY'">
                <div>Christy</div>
            </div>
            <div class="member">
                <img src="images/flora.jpg" onerror="this.src='https://via.placeholder.com/120/111111/ffffff?text=FLORA'">
                <div>Flora</div>
            </div>
        </div>
    </div>

    <div class="replay-list">

        <div class="replay-card active" onclick="changeVideo(this,'8PQIt0DT5ls')">
            <img src="https://img.youtube.com/vi/8PQIt0DT5ls/maxresdefault.jpg">
            <div class="replay-info">
                <div class="replay-title">ITADAKI♥LOVE - Team Love</div>
                <div class="replay-date">06/06/2026</div>
            </div>
        </div>

        <div class="replay-card" onclick="changeVideo(this,'F4vvxxJ0RbU')">
            <img src="https://img.youtube.com/vi/F4vvxxJ0RbU/maxresdefault.jpg">
            <div class="replay-info">
                <div class="replay-title">Sambil Menggandeng Erat Tanganku - Team Passion</div>
                <div class="replay-date">06/06/2026</div>
            </div>
        </div>

        <div class="replay-card" onclick="changeVideo(this,'4oTnrSgaAtI')">
            <img src="https://img.youtube.com/vi/4oTnrSgaAtI/maxresdefault.jpg">
            <div class="replay-info">
                <div class="replay-title">DREAM BAKUDAN - Team Dream</div>
                <div class="replay-date">05/06/2026</div>
            </div>
        </div>

        <div class="replay-card" onclick="changeVideo(this,'PpYzXO7RJ0s')">
            <img src="https://img.youtube.com/vi/PpYzXO7RJ0s/maxresdefault.jpg">
            <div class="replay-info">
                <div class="replay-title">Pajama Drive</div>
                <div class="replay-date">04/06/2026</div>
            </div>
        </div>

    </div>

</div>

<script>
function changeVideo(card, videoId){
    document.getElementById("mainPlayer").src =
    "https://www.youtube.com/embed/" + videoId + "?rel=0&playsinline=0&fs=1&autoplay=1";

    document.getElementById("openYoutube").href =
    "https://youtu.be/" + videoId;

    document.querySelectorAll(".replay-card").forEach(el=>{
        el.classList.remove("active");
    });

    card.classList.add("active");
}

function toggleLineup(){
    const list = document.getElementById("lineupList");
    list.style.display = list.style.display === "flex" ? "none" : "flex";
}
</script>

</body>
</html>
