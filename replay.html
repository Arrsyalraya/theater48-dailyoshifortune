<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replay Theater48Fight</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

.replay-wrap{
    max-width:900px;
    margin:auto;
    background:#0b0b0b;
}

.player-box{
    position:sticky;
    top:0;
    z-index:10;
    background:#000;
}

.player iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    display:block;
}

.lineup-box{
    background:#151515;
    margin:12px 0;
    padding:28px 15px;
    text-align:center;
    border-radius:0 0 22px 22px;
}

.lineup-box h2{
    margin:0 0 22px;
    font-size:26px;
}

.lineup-box button{
    background:#ff5bbd;
    border:none;
    color:white;
    padding:14px 34px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
}

.replay-list{
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.replay-card{
    display:flex;
    gap:16px;
    align-items:center;
    background:#1b1b1b;
    border:1px solid #333;
    border-radius:14px;
    padding:12px;
    cursor:pointer;
    transition:.2s;
}

.replay-card:hover{
    background:#252525;
    transform:scale(1.01);
}

.replay-card.active{
    border:1px solid #ff5bbd;
    background:#242024;
}

.replay-card img{
    width:210px;
    height:118px;
    object-fit:cover;
    border-radius:10px;
    background:#222;
    flex-shrink:0;
}

.replay-info{
    text-align:left;
}

.replay-title{
    font-size:20px;
    font-weight:bold;
    line-height:1.35;
}

.replay-date{
    margin-top:8px;
    color:#aaa;
    font-size:17px;
}

@media(max-width:600px){
    .replay-list{
        padding:12px;
    }

    .replay-card{
        gap:12px;
        padding:10px;
    }

    .replay-card img{
        width:135px;
        height:76px;
    }

    .replay-title{
        font-size:16px;
    }

    .replay-date{
        font-size:14px;
    }

    .lineup-box h2{
        font-size:24px;
    }
}
</style>
</head>

<body>

<div class="replay-wrap">

    <div class="player-box">
        <div class="player">
            <iframe
                id="mainPlayer"
                src="https://www.youtube.com/embed/8PQIt0DT5ls?rel=0&playsinline=0&fs=1"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                allowfullscreen
                webkitallowfullscreen
                mozallowfullscreen>
            </iframe>
        </div>
    </div>

    <div class="lineup-box">
        <h2>Line up Member</h2>
        <button onclick="alert('Line-up member akan ditambahkan.')">Tampilkan Line-up</button>
    </div>

    <div class="replay-list">

        <div class="replay-card active" onclick="changeVideo(this,'8PQIt0DT5ls')">
            <img src="https://img.youtube.com/vi/8PQIt0DT5ls/maxresdefault.jpg">
            <div class="replay-info">
                <div class="replay-title">ITADAKI♥LOVE - Team Love</div>
                <div class="replay-date">06/06/2026</div>
            </div>
        </div>

        <div class="replay-card" onclick="changeVideo(this,'F4vvxxJ0RbU')">
            <img src="https://img.youtube.com/vi/F4vvxxJ0RbU/maxresdefault.jpg">
            <div class="replay-info">
                <div class="replay-title">Sambil Menggandeng Erat Tanganku - Team Passion</div>
                <div class="replay-date">06/06/2026</div>
            </div>
        </div>

        <div class="replay-card" onclick="changeVideo(this,'4oTnrSgaAtI')">
            <img src="https://img.youtube.com/vi/4oTnrSgaAtI/maxresdefault.jpg">
            <div class="replay-info">
                <div class="replay-title">DREAM BAKUDAN - Team Dream</div>
                <div class="replay-date">05/06/2026</div>
            </div>
        </div>

        <div class="replay-card" onclick="changeVideo(this,'PpYzXO7RJ0s')">
            <img src="https://img.youtube.com/vi/PpYzXO7RJ0s/maxresdefault.jpg">
            <div class="replay-info">
                <div class="replay-title">Pajama Drive</div>
                <div class="replay-date">04/06/2026</div>
            </div>
        </div>

    </div>

</div>

<script>
function changeVideo(card, videoId){
    document.getElementById("mainPlayer").src =
    "https://www.youtube.com/embed/" + videoId + "?rel=0&playsinline=0&fs=1&autoplay=1";

    document.querySelectorAll(".replay-card").forEach(el=>{
        el.classList.remove("active");
    });

    card.classList.add("active");

    tryLandscape();
}

async function tryLandscape(){
    try{
        if(document.fullscreenElement && screen.orientation && screen.orientation.lock){
            await screen.orientation.lock("landscape");
        }
    }catch(e){
        console.log("Orientation lock dibatasi browser.");
    }
}
</script>

</body>
</html>
