<!DOCTYPE html>
<html lang="id">
<head>

  <link rel="stylesheet" href="style.css?v=5000" />
</head>

<body data-page="collection">
  <div class="lux-bg">
    <span></span><span></span><span></span><span></span>
  </div>

  <main class="wrap">
    <header class="hero">
      <div class="badge">ALBUM COLLECTION</div>
      <h1>📚 Koleksi Saya</h1>

<nav>
  <a href="https://arrsyalraya.github.io/theater48-dailyoshifortune/gacha.html">Gacha</a>
  <a href="collection.html" class="nav-active">Koleksi Saya</a>
</nav>
    </header>

    <section class="panel glass">

 <div class="filters">

  <button onclick="setFilter('Rare')">Rare</button>
  <button onclick="setFilter('Super Rare')">Super Rare</button>

  <button onclick="setFilter('Legendary Rare')">Legendary Rare</button>
  <button onclick="setFilter('Secret')">Secret</button>
  <button onclick="setFilter('Infinity')">Infinity</button>
</div>

<div style="margin-top:20px">
  <select id="memberFilter" onchange="setMemberFilter(this.value)">
    <option value="ALL">Semua Member</option>
  </select>
</div>
    </section>

    <section class="panel">
      <div class="collection" id="collection"></div>
    </section>
  </main>

  <script src="./app.js?v=5000"></script>
