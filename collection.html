<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koleksi Saya - Theater48Fight</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="collection">
  <div class="lux-bg">
    <span></span><span></span><span></span><span></span>
  </div>

  <main class="wrap">
    <header class="hero">
      <div class="badge">ALBUM COLLECTION</div>
      <h1>📚 Koleksi Saya</h1>
      <p>Album kartu Theater48Fight Card Gacha.</p>

      <nav>
        <a href="index.html">Gacha</a>
        <a href="collection.html" class="nav-active">Koleksi Saya</a>
      </nav>
    </header>

    <section class="panel glass">
      <div class="stats">
        <div class="stat">Koleksi<br><b id="collectionCount">0 / 435</b></div>
        <div class="stat">Duplicate<br><b id="dupeCount">0 / 20</b></div>
      </div>

      <div class="filters">
        <button onclick="setFilter('ALL')">Semua</button>
        <button onclick="setFilter('N')">N</button>
        <button onclick="setFilter('R')">R</button>
        <button onclick="setFilter('SR')">SR</button>
        <button onclick="setFilter('SSR')">SSR</button>
        <button onclick="setFilter('UR')">UR</button>
        <button onclick="setFilter('LR')">LR</button>
        <button onclick="setFilter('SECRET')">SECRET</button>
        <button onclick="setFilter('INFINITY')">INFINITY</button>
      </div>
    </section>

    <section class="panel">
      <div class="collection" id="collection"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
