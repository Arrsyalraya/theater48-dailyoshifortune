<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replay Theater48Fight</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:0;
}
    
.replay-wrap{
    width:100%;
    max-width:none;
    margin:0;
    padding:0;
    background:#0b0b0b;
}

.player-box{
    background:#000;
    width:100%;
    margin:0;
    padding:0;
}

.youtube-player{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    display:block;
}

.drive-player{
    width:100%;
    height:70vh;
    min-height:350px;
    border:none;
    display:block;
}

.lineup-box{
    background:#151515;
    margin:12px 0;
    padding:22px 15px;
    text-align:center;
    border-radius:0 0 22px 22px;
}

.lineup-box h2{
    margin:0 0 18px;
    font-size:26px;
}

.lineup-box button{
    background:#ff2b2b;
    border:none;
    color:white;
    padding:13px 30px;
    border-radius:12px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.lineup-box button:hover{
    background:#d70000;
}

.lineup-list{
    display:none;
    grid-template-columns:repeat(6,90px);
    gap:22px 26px;
    justify-content:center;
    justify-items:center;
    margin-top:20px;
    max-width:720px;
    margin-left:auto;
    margin-right:auto;
}

.member{
    width:85px;
    text-align:center;
}

.member img{
    width:72px;
    height:72px;
    border-radius:12px;
    object-fit:cover;
    background:#222;
    border:2px solid #ff2b2b;
    box-shadow:0 0 8px rgba(255,43,43,.35);
}

.member div{
    margin-top:6px;
    font-size:12px;
    color:#eee;
}

.replay-list{
    padding:18px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:14px;
}

.replay-card{
    display:flex;
    gap:16px;
    align-items:center;
    background:#1b1b1b;
    border:1px solid transparent;
    border-radius:14px;
    padding:12px;
    cursor:pointer;
    transition:.2s;
}

.replay-card:hover{
    background:#252525;
}

.replay-card.active{
    border:1px solid #ff2b2b;
    background:#251515;
}

.replay-card img{
    width:170px;
    height:96px;
    object-fit:cover;
    border-radius:10px;
    background:#222;
    flex-shrink:0;
}

.replay-info{
    text-align:left;
}

.replay-title{
    font-size:18px;
    font-weight:bold;
    line-height:1.35;
}

.replay-date{
    margin-top:8px;
    color:#aaa;
    font-size:15px;
}

.empty-lineup{
    color:#aaa;
    font-size:15px;
    margin-top:15px;
}
    
.month-dropdown{
    width:280px;
    margin:15px auto 20px auto;
    position:relative;
    z-index:9999;
}

.month-dropdown details{
    background:#151515;
    border:1px solid #ff2b2b;
    border-radius:12px;
    overflow:visible;
}

.month-dropdown summary{
    list-style:none;
    cursor:pointer;
    padding:12px 16px;
    color:#fff;
    font-size:15px;
    font-weight:600;
    text-align:center;
    user-select:none;
}

.month-dropdown summary::-webkit-details-marker{
    display:none;
}

.month-dropdown summary::after{
    content:"▼";
    float:right;
    font-size:10px;
    opacity:.8;
    margin-top:4px;
}

.month-dropdown details[open] summary::after{
    content:"▲";
}

/* Dropdown ngambang */
.month-dropdown details[open] .dropdown-content{
    display:block;
}

.dropdown-content{
    display:none;
    position:absolute;
    top:100%;
    left:0;
    width:100%;
    background:#111;
    border:1px solid #ff2b2b;
    border-radius:0 0 12px 12px;
    box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.dropdown-content a{
    display:block;
    padding:12px 15px;
    color:white;
    text-decoration:none;
    text-align:center;
    font-size:14px;
    border-top:1px solid #222;
}

.dropdown-content a:hover{
    background:#202020;
    color:#ff2b2b;
}

/* Mobile */
@media(max-width:650px){

    .month-dropdown{
        width:220px;
    }

    .month-dropdown summary{
        font-size:13px;
        padding:10px 14px;
    }

    .dropdown-content a{
        font-size:12px;
        padding:10px;
    }
}
    
@media(max-width:650px){

    .drive-player{
    height:320px;
}
    
    .replay-wrap{
    width:100%;
    max-width:none;
    margin:0;
    padding:0;
}

    .replay-list{
        padding:12px;
        display:flex;
        flex-direction:column;
        gap:14px;
    }

    .replay-card{
        gap:12px;
        padding:10px;
    }

    .replay-card img{
        width:135px;
        height:76px;
    }

    .replay-title{
        font-size:16px;
    }

    .replay-date{
        font-size:14px;
    }

    .lineup-box h2{
        font-size:24px;
    }

    .lineup-list{
    max-width:420px;
    gap:14px;
    display:none;
    grid-template-columns:repeat(4,1fr);
    justify-items:center;
}

    .member{
        width:72px;
    }

    .member img{
        width:64px;
        height:64px;
        border-radius:10px;
        object-fit:cover;
    }

    .member div{
        font-size:11px;
    }
}

.fullscreen-holder{
    position:relative;
    background:#000;
}

.fullscreen-btn{
    position:absolute;
    right:14px;
    bottom:14px;
    z-index:20;
    width:46px;
    height:46px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,.65);
    color:white;
    font-size:22px;
    cursor:pointer;
}

.fullscreen-holder:fullscreen{
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
}

.fullscreen-holder:fullscreen iframe{
    width:100vw;
    height:100vh;
    aspect-ratio:auto;
}

function renderReplayList(){
    const list = document.getElementById("replayList");
    list.innerHTML = "";

    videos.forEach((video,index)=>{
        list.innerHTML += `
            <div class="replay-card ${index === 0 ? "active" : ""}" onclick="changeVideo(this,'${video.id}')">
                <img src="${
                video.type === 'youtube'
                ?
                'https://img.youtube.com/vi/' + video.id + '/maxresdefault.jpg'
                :
                video.thumbnail
                }">
                <div class="replay-info">
                    <div class="replay-title">${video.title}</div>
                    <div class="replay-date">${video.date}</div>
                </div>
            </div>
        `;
    });
}

function renderLineup(videoId){
    const video = videos.find(v => v.id === videoId);
    const lineupBox = document.getElementById("lineupList");

    if(!video || !video.lineup || video.lineup.length === 0){
        lineupBox.innerHTML = `<div class="empty-lineup">Line-up belum tersedia.</div>`;
        return;
    }

    lineupBox.innerHTML = "";

    video.lineup.forEach(key=>{
        const member = memberData[key];

        if(member){
            lineupBox.innerHTML += `
                <div class="member">
                    <img src="${member.img}" onerror="this.src='https://via.placeholder.com/120/111111/ffffff?text=${member.name}'">
                    <div>${member.name}</div>
                </div>
            `;
        }
    });
}

function getVideoUrl(video){

    if(video.type === "youtube"){
        return "https://www.youtube.com/embed/" +
        video.id +
        "?autoplay=1&mute=1&rel=0&playsinline=0&fs=1";
    }

    if(video.type === "drive"){
        return "https://drive.google.com/file/d/" +
        video.id +
        "/preview?usp=drivesdk";
    }

}
    
function changeVideo(card, videoId){

    const video = videos.find(v => v.id === videoId);

    const player = document.getElementById("mainPlayer");

player.src = getVideoUrl(video);

if(video.type === "drive"){
    player.className = "drive-player";
}else{
    player.className = "youtube-player";
}

    document.querySelectorAll(".replay-card").forEach(el=>{
        el.classList.remove("active");
    });

    card.classList.add("active");

    renderLineup(videoId);

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

}
    
function toggleLineup(){
    const list = document.getElementById("lineupList");
    const btn = document.querySelector(".lineup-box button");

    if(list.style.display === "grid"){
        list.style.display = "none";
        btn.innerText = "Tampilkan Line-up";
    }else{
        list.style.display = "grid";
        btn.innerText = "Tutupkan Line-up";
    }
}

async function openLandscapeFullscreen(){
    const holder = document.getElementById("fullscreenHolder");

    try{
        if(holder.requestFullscreen){
            await holder.requestFullscreen();
        }else if(holder.webkitRequestFullscreen){
            holder.webkitRequestFullscreen();
        }else if(holder.msRequestFullscreen){
            holder.msRequestFullscreen();
        }

        if(screen.orientation && screen.orientation.lock){
            try{
                await screen.orientation.lock("landscape");
            }catch(e){
                console.log("Orientation lock ditolak browser:", e);
            }
        }

    }catch(err){
        console.log("Fullscreen gagal:", err);
    }
}

document.addEventListener("fullscreenchange", async function(){
    if(!document.fullscreenElement){
        if(screen.orientation && screen.orientation.unlock){
            try{
                screen.orientation.unlock();
            }catch(e){}
        }
    }
});
    
renderReplayList();
renderLineup(videos[0].id);

const player = document.getElementById("mainPlayer");

player.src = getVideoUrl(videos[0]);

if(videos[0].type === "drive"){
    player.className = "drive-player";
}else{
    player.className = "youtube-player";
}
    
</script>
